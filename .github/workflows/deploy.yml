name: Deploy service on main branch updates

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/ecs-user/Media360-React

            echo "[INFO] START DEPLOY"
            pwd
            ls -la

            git pull origin main

            echo "[INFO] Installing..."
            npm install --legacy-peer-deps

            echo "[INFO] Building..."
            npm run build

            echo "[INFO] DONE"